<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fluxr - Messages</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/style1.css">
<link rel="stylesheet" href="css/style2.css">
<link rel="stylesheet" href="css/style3.css">
<link rel="stylesheet" href="css/style4.css">
<link rel="stylesheet" href="css/style5.css">
<link rel="stylesheet" href="css/style6.css">
<link rel="stylesheet" href="css/style7.css">
<link rel="stylesheet" href="css/style8.css">
<link rel="stylesheet" href="css/style9.css">
<link rel="stylesheet" href="css/style10.css">
</head>
<body>

<div id="nav-root"></div>

<section class="page-title-bar">
  <div class="container">
    <h1 class="h2 mb-0" data-i18n="msg-page-title">Private Messages</h1>
    <p class="page-subtitle" data-i18n="msg-page-sub">Chat with your friends</p>
  </div>
</section>

<section class="page-section page-section-alt">
  <div class="container">
    <div id="msgLoginMsg" class="alert alert-fluxr d-none"></div>
    <div class="row g-4" id="msgContent">
      <div class="col-lg-4">
        <div class="card fluxr-card">
          <div class="card-body p-4">
            <h5 class="mb-3" data-i18n="msg-friends-list">Friends</h5>
            <div class="list-group" id="msgFriendList"></div>
          </div>
        </div>
      </div>
      <div class="col-lg-8">
        <div class="card fluxr-card msg-chat-card">
          <div class="card-header">
            <strong id="msgChatTitle" data-i18n="msg-pick-friend">Pick a friend to start</strong>
          </div>
          <div class="card-body msg-chat-body" id="msgChatBox">
            <p class="text-muted small mb-0" data-i18n="msg-empty">Select a friend from the list.</p>
          </div>
          <div class="card-footer">
            <form id="msgForm" class="d-flex gap-2">
              <input type="text" class="form-control" id="msgInput" data-i18n-placeholder="msg-placeholder" placeholder="Type your message..." required disabled>
              <button type="submit" class="btn btn-fluxr-primary" id="msgSendBtn" disabled data-i18n="chat-send">Send</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-root"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/fluxr-data.js"></script>
<script src="js/script1.js"></script>
<script src="js/script2.js"></script>
<script src="js/script3.js"></script>
<script src="js/script4.js"></script>
<script src="js/script11.js"></script>
</body>
</html>
