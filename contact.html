<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fluxr - Contact</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/style1.css">
<link rel="stylesheet" href="css/style2.css">
<link rel="stylesheet" href="css/style3.css">
<link rel="stylesheet" href="css/style4.css">
<link rel="stylesheet" href="css/style5.css">
<link rel="stylesheet" href="css/style6.css">
<link rel="stylesheet" href="css/style7.css">
<link rel="stylesheet" href="css/style8.css">
<link rel="stylesheet" href="css/style9.css">
<link rel="stylesheet" href="css/style10.css">
</head>
<body>

<div id="nav-root"></div>

<section class="page-title-bar">
  <div class="container">
    <h1 class="h2 mb-0" data-i18n="contact-title">Contact Us</h1>
    <p class="page-subtitle" data-i18n="contact-subtitle">We are here to help</p>
  </div>
</section>

<section class="page-section py-5">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card fluxr-card form-card h-100">
          <div class="card-body p-4">
            <h5 class="card-title mb-4" data-i18n="contact-send-title">Send a Message</h5>
            <form action="#" method="post" id="contactForm">
              <div class="mb-3">
                <label for="contactName" class="form-label" data-i18n="form-name">Name</label>
                <input type="text" class="form-control" id="contactName" name="name" required>
              </div>
              <div class="mb-3">
                <label for="contactEmail" class="form-label" data-i18n="form-email">Email</label>
                <input type="email" class="form-control" id="contactEmail" name="email" required>
              </div>
              <div class="mb-3">
                <label for="contactSubject" class="form-label" data-i18n="form-subject">Subject</label>
                <input type="text" class="form-control" id="contactSubject" name="subject" required>
              </div>
              <div class="mb-4">
                <label for="contactMessage" class="form-label" data-i18n="form-message">Message</label>
                <textarea class="form-control" id="contactMessage" name="message" rows="5" required></textarea>
              </div>
              <button type="submit" class="btn btn-fluxr-primary" data-i18n="btn-send-message">Send Message</button>
            </form>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card fluxr-card info-card h-100">
          <div class="card-body p-4">
            <h5 class="card-title mb-4" data-i18n="contact-touch">Get in Touch</h5>
            <img src="assets/images/contact-office.jpg" alt="Fluxr office" class="img-placeholder rounded mb-4 about-hero-img">
            <ul class="list-unstyled mb-0 contact-info-list">
              <li class="mb-0"><i class="fa fa-map-marker me-2"></i> Level 8, Menara Fluxr, Jalan Ampang, 50450 Kuala Lumpur</li>
              <li class="mb-0"><i class="fa fa-envelope me-2"></i> support@fluxr.my</li>
              <li class="mb-0"><i class="fa fa-phone me-2"></i> 03-5544 2000</li>
              <li><i class="fa fa-clock-o me-2"></i> <span data-i18n="contact-hours">Mon-Fri, 9am-5pm</span></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-root"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/script1.js"></script>
<script src="js/script2.js"></script>
<script src="js/script3.js"></script>
<script src="js/script4.js"></script>
<script src="js/script10.js"></script>
</body>
</html>
