<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fluxr - My Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/style1.css">
<link rel="stylesheet" href="css/style2.css">
<link rel="stylesheet" href="css/style3.css">
<link rel="stylesheet" href="css/style4.css">
<link rel="stylesheet" href="css/style5.css">
<link rel="stylesheet" href="css/style6.css">
<link rel="stylesheet" href="css/style7.css">
<link rel="stylesheet" href="css/style8.css">
<link rel="stylesheet" href="css/style9.css">
<link rel="stylesheet" href="css/style10.css">
</head>
<body>

<div id="nav-root"></div>

<section class="page-title-bar">
  <div class="container">
    <h1 class="h2 mb-0" data-i18n="profile-page-title">My Profile</h1>
    <p class="page-subtitle" data-i18n="profile-page-sub">Your Fluxr account</p>
  </div>
</section>

<section class="page-section">
  <div class="container">
    <div id="profileLoginMsg" class="alert alert-fluxr d-none"></div>
    <div class="row g-4" id="profileContent">
      <div class="col-lg-4">
        <div class="card fluxr-card text-center">
          <div class="card-body p-4">
            <img src="assets/images/profile-default.jpg" alt="Profile" class="rounded-circle mb-3 profile-pulse" width="100" height="100">
            <h4 id="profileName">Guest</h4>
            <p class="text-muted small mb-3" id="profileBioText">No bio yet.</p>
            <form id="bioForm">
              <div class="mb-3 text-start">
                <label for="bioInput" class="form-label" data-i18n="profile-bio-label">Bio</label>
                <textarea class="form-control" id="bioInput" rows="3"></textarea>
              </div>
              <button type="submit" class="btn btn-fluxr-primary btn-sm w-100" data-i18n="profile-save-bio">Save Bio</button>
            </form>
            <a href="messages.html" class="btn btn-outline-primary btn-sm w-100 mt-2" data-i18n="profile-go-messages">Go to Messages</a>
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card fluxr-card h-100">
          <div class="card-body p-4">
            <h5 class="mb-3" data-i18n="profile-friends-title">My Friends</h5>
            <ul class="list-group list-group-flush mb-4" id="profileFriendList"></ul>
            <h6 class="mb-2" id="profileSuggestTitle" data-i18n="profile-suggest-title">Registered Members</h6>
            <ul class="list-group list-group-flush" id="profileSuggestList"></ul>
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card fluxr-card h-100">
          <div class="card-body p-4">
            <h5 class="mb-3" data-i18n="profile-posts-title">My Posts</h5>
            <ul class="list-group list-group-flush" id="profilePostList"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-root"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/fluxr-data.js"></script>
<script src="js/script1.js"></script>
<script src="js/script2.js"></script>
<script src="js/script3.js"></script>
<script src="js/script4.js"></script>
<script src="js/script11.js"></script>
</body>
</html>
