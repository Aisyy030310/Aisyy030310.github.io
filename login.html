<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fluxr - Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/style1.css">
<link rel="stylesheet" href="css/style2.css">
<link rel="stylesheet" href="css/style3.css">
<link rel="stylesheet" href="css/style4.css">
<link rel="stylesheet" href="css/style5.css">
<link rel="stylesheet" href="css/style6.css">
<link rel="stylesheet" href="css/style7.css">
<link rel="stylesheet" href="css/style8.css">
<link rel="stylesheet" href="css/style9.css">
<link rel="stylesheet" href="css/style10.css">
</head>
<body>

<div id="nav-root"></div>

<section class="page-title-bar">
  <div class="container">
    <h1 class="h2 mb-0" data-i18n="login-title">Login</h1>
    <p class="page-subtitle" data-i18n="login-subtitle">Sign in to your account</p>
  </div>
</section>

<section class="page-section py-5 page-section-alt">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="card fluxr-card auth-card">
          <div class="card-header">
            <img src="assets/images/fluxr-logo.png" alt="Fluxr">
            <p class="mb-0 small text-muted" data-i18n="login-welcome">Welcome back to Fluxr</p>
          </div>
          <div class="card-body p-4">
            <form action="#" method="post" id="loginForm">
              <div class="mb-3">
                <label for="loginEmail" class="form-label" data-i18n="form-email">Email</label>
                <input type="email" class="form-control" id="loginEmail" name="email" required>
              </div>
              <div class="mb-3">
                <label for="loginPassword" class="form-label" data-i18n="form-password">Password</label>
                <input type="password" class="form-control" id="loginPassword" name="password" required>
              </div>
              <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe" name="remember">
                <label class="form-check-label" for="rememberMe" data-i18n="form-remember">Remember me</label>
              </div>
              <button type="submit" class="btn btn-fluxr-primary w-100" data-i18n="btn-sign-in">Sign In</button>
            </form>
            <p class="text-center text-muted small mt-3 mb-0"><span data-i18n="login-no-account">No account yet?</span> <a href="join.html" data-i18n="login-register-link">Register here</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-root"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/script1.js"></script>
<script src="js/script2.js"></script>
<script src="js/script3.js"></script>
<script src="js/script4.js"></script>
<script src="js/fluxr-data.js"></script>
<script src="js/script10.js"></script>
</body>
</html>
