<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fluxr - Join</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/style1.css">
<link rel="stylesheet" href="css/style2.css">
<link rel="stylesheet" href="css/style3.css">
<link rel="stylesheet" href="css/style4.css">
<link rel="stylesheet" href="css/style5.css">
<link rel="stylesheet" href="css/style6.css">
<link rel="stylesheet" href="css/style7.css">
<link rel="stylesheet" href="css/style8.css">
<link rel="stylesheet" href="css/style9.css">
<link rel="stylesheet" href="css/style10.css">
</head>
<body>

<div id="nav-root"></div>

<section class="page-title-bar">
  <div class="container">
    <h1 class="h2 mb-0" data-i18n="join-title">Create Account</h1>
    <p class="page-subtitle" data-i18n="join-subtitle">Create your free account</p>
  </div>
</section>

<section class="page-section page-section-alt">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8">
        <div class="card fluxr-card auth-card">
          <div class="card-header">
            <img src="assets/images/fluxr-logo.png" alt="Fluxr">
            <p class="mb-0 small text-muted" data-i18n="join-welcome">Join Fluxr for free</p>
          </div>
          <div class="card-body p-4">
            <form action="#" method="post" id="joinForm">
              <div class="mb-3">
                <label for="fullName" class="form-label" data-i18n="form-fullname">Full Name</label>
                <input type="text" class="form-control" id="fullName" name="fullName" required>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label" data-i18n="form-email">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label" data-i18n="form-password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
              </div>
              <div class="mb-3">
                <label for="confirmPassword" class="form-label" data-i18n="form-confirm-password">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
              </div>
              <div class="mb-3">
                <label for="dob" class="form-label" data-i18n="form-dob">Date of Birth</label>
                <input type="date" class="form-control" id="dob" name="dob" required>
              </div>
              <div class="mb-4">
                <label class="form-label d-block" data-i18n="form-gender">Gender</label>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" id="genderMale" value="male">
                  <label class="form-check-label" for="genderMale" data-i18n="form-gender-male">Male</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" id="genderFemale" value="female">
                  <label class="form-check-label" for="genderFemale" data-i18n="form-gender-female">Female</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" id="genderOther" value="other">
                  <label class="form-check-label" for="genderOther" data-i18n="form-gender-other">Other</label>
                </div>
              </div>
              <button type="submit" class="btn btn-fluxr-primary w-100" data-i18n="btn-register">Register</button>
            </form>
            <p class="text-center text-muted small mt-3 mb-0"><span data-i18n="join-have-account">Already have an account?</span> <a href="login.html" data-i18n="join-login-link">Login here</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-root"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/script1.js"></script>
<script src="js/script2.js"></script>
<script src="js/script3.js"></script>
<script src="js/script4.js"></script>
<script src="js/fluxr-data.js"></script>
<script src="js/script10.js"></script>
</body>
</html>
