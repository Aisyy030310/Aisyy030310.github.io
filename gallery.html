<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fluxr - Gallery</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/style1.css">
<link rel="stylesheet" href="css/style2.css">
<link rel="stylesheet" href="css/style3.css">
<link rel="stylesheet" href="css/style4.css">
<link rel="stylesheet" href="css/style5.css">
<link rel="stylesheet" href="css/style6.css">
<link rel="stylesheet" href="css/style7.css">
<link rel="stylesheet" href="css/style8.css">
<link rel="stylesheet" href="css/style9.css">
<link rel="stylesheet" href="css/style10.css">
</head>
<body>

<div id="nav-root"></div>

<section class="page-title-bar">
  <div class="container">
    <h1 class="h2 mb-0" data-i18n="gallery-title">Photo Gallery</h1>
    <p class="page-subtitle" data-i18n="gallery-subtitle">Moments shared on Fluxr</p>
  </div>
</section>

<section class="page-section">
  <div class="container">
    <p class="section-lead text-center" data-i18n="gallery-lead">Photos from Fluxr events and community moments.</p>
    <div class="row g-4">
      <div class="col-md-4 col-sm-6 d-flex">
        <div class="card fluxr-card gallery-card w-100">
          <div class="gallery-card-img-wrap">
            <img src="assets/images/gallery-01.jpg" alt="Launch event 2026" class="gallery-thumb" data-gallery="assets/images/gallery-01.jpg" role="button">
          </div>
          <div class="card-body"><p class="card-text small text-muted mb-0 gallery-caption" data-i18n="gal-1">Launch event 2026</p></div>
        </div>
      </div>
      <div class="col-md-4 col-sm-6 d-flex">
        <div class="card fluxr-card gallery-card w-100">
          <div class="gallery-card-img-wrap">
            <img src="assets/images/gallery-02.jpg" alt="Team workshop" class="gallery-thumb" data-gallery="assets/images/gallery-02.jpg" role="button">
          </div>
          <div class="card-body"><p class="card-text small text-muted mb-0 gallery-caption" data-i18n="gal-2">Team workshop</p></div>
        </div>
      </div>
      <div class="col-md-4 col-sm-6 d-flex">
        <div class="card fluxr-card gallery-card w-100">
          <div class="gallery-card-img-wrap">
            <img src="assets/images/gallery-03.jpg" alt="Company sports day" class="gallery-thumb" data-gallery="assets/images/gallery-03.jpg" role="button">
          </div>
          <div class="card-body"><p class="card-text small text-muted mb-0 gallery-caption" data-i18n="gal-3">Company sports day</p></div>
        </div>
      </div>
      <div class="col-md-4 col-sm-6 d-flex">
        <div class="card fluxr-card gallery-card w-100">
          <div class="gallery-card-img-wrap">
            <img src="assets/images/gallery-04.jpg" alt="Team meeting" class="gallery-thumb" data-gallery="assets/images/gallery-04.jpg" role="button">
          </div>
          <div class="card-body"><p class="card-text small text-muted mb-0 gallery-caption" data-i18n="gal-4">Team meeting</p></div>
        </div>
      </div>
      <div class="col-md-4 col-sm-6 d-flex">
        <div class="card fluxr-card gallery-card w-100">
          <div class="gallery-card-img-wrap">
            <img src="assets/images/gallery-05.jpg" alt="Office opening" class="gallery-thumb" data-gallery="assets/images/gallery-05.jpg" role="button">
          </div>
          <div class="card-body"><p class="card-text small text-muted mb-0 gallery-caption" data-i18n="gal-5">Office opening</p></div>
        </div>
      </div>
      <div class="col-md-4 col-sm-6 d-flex">
        <div class="card fluxr-card gallery-card w-100">
          <div class="gallery-card-img-wrap">
            <img src="assets/images/gallery-06.jpg" alt="Team outing" class="gallery-thumb" data-gallery="assets/images/gallery-06.jpg" role="button">
          </div>
          <div class="card-body"><p class="card-text small text-muted mb-0 gallery-caption" data-i18n="gal-6">Team outing</p></div>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="modal fade" id="galleryModal" tabindex="-1" aria-labelledby="galleryModalCaption">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="galleryModalCaption">Gallery</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body gallery-modal-body">
        <img src="" alt="" class="gallery-modal-img" id="galleryModalImg">
      </div>
    </div>
  </div>
</div>

<div id="footer-root"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/script1.js"></script>
<script src="js/script2.js"></script>
<script src="js/script3.js"></script>
<script src="js/script4.js"></script>
<script src="js/script8.js"></script>
</body>
</html>
